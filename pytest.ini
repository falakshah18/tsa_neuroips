[pytest]
filterwarnings =
    # spikingjelly 0.0.0.0.14 uses `@torch.jit.script` internally
    # (activation_based/functional.py, activation_based/lava_exchange.py).
    # This fires ~60 DeprecationWarnings on import, before any of our code
    # runs -- confirmed by importing spikingjelly.activation_based.functional
    # directly with no other imports present. It's a third-party library
    # issue, not something fixable here without patching an installed
    # dependency in place, which would be fragile and non-portable. Ignored
    # explicitly (by exact message) rather than blanket-suppressed, so any
    # *new* deprecation warning from our own code still surfaces normally.
    ignore:`torch\.jit\.script` is deprecated\. Please switch to `torch\.compile` or `torch\.export`\.:DeprecationWarning
